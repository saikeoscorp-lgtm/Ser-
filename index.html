<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RELAY CONTROL</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #090c10;
    --surface: #0d1117;
    --border: #1e2d3d;
    --on: #00ffe7;
    --on-dim: #00ffe720;
    --on-glow: #00ffe760;
    --off: #ff3a5c;
    --off-dim: #ff3a5c18;
    --off-glow: #ff3a5c50;
    --neutral: #3a4a5c;
    --text: #c9d8e8;
    --text-dim: #4a6070;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Exo 2', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,255,231,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,231,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    pointer-events: none; z-index: 0;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 420px; margin: 0 auto;
    padding: 20px 16px 32px;
    display: flex; flex-direction: column; gap: 18px;
  }

  /* ── Header ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  .header-title { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; }
  .header-name  { font-family: var(--sans); font-weight: 900; font-size: 22px; letter-spacing: 1px; color: #fff; text-transform: uppercase; }

  .conn-badge {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: var(--text-dim);
    background: var(--surface); border: 1px solid var(--border);
    padding: 6px 10px; border-radius: 4px;
  }
  .conn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--neutral); transition: all 0.4s; }
  .conn-dot.online { background: var(--on); box-shadow: 0 0 8px var(--on); animation: blink 2s infinite; }
  .conn-dot.error  { background: var(--off); box-shadow: 0 0 8px var(--off); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

  /* ── Relay card ── */
  .relay-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 26px 24px;
    display: flex; flex-direction: column; align-items: center; gap: 22px;
    position: relative; overflow: hidden;
    transition: border-color 0.5s, box-shadow 0.5s;
  }
  .relay-card::before { content:''; position:absolute; top:8px; left:8px; width:16px; height:16px; border:1px solid var(--border); border-right:none; border-bottom:none; }
  .relay-card::after  { content:''; position:absolute; bottom:8px; right:8px; width:16px; height:16px; border:1px solid var(--border); border-left:none; border-top:none; }
  .relay-card.active  { border-color: var(--on-glow); box-shadow: 0 0 40px var(--on-dim), inset 0 0 40px var(--on-dim); }
  .relay-card.inactive{ border-color: var(--off-glow); box-shadow: 0 0 24px var(--off-dim), inset 0 0 24px var(--off-dim); }

  .relay-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; }

  /* Power button */
  .power-btn {
    width: 144px; height: 144px; border-radius: 50%;
    border: none; background: var(--bg); cursor: pointer;
    position: relative; display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s; outline: none;
  }
  .power-btn:active { transform: scale(0.93); }
  .power-btn.loading { pointer-events: none; animation: load-pulse 0.5s ease-in-out infinite alternate; }
  @keyframes load-pulse { from{opacity:0.4} to{opacity:1} }

  .ring1 { position:absolute; inset:0; border-radius:50%; border:2px solid var(--neutral); transition:all 0.4s; }
  .ring2 { position:absolute; inset:10px; border-radius:50%; border:1px solid transparent; transition:all 0.4s; }

  .power-btn.on .ring1 { border-color:var(--on); box-shadow:0 0 24px var(--on-glow), 0 0 60px var(--on-dim), inset 0 0 20px var(--on-dim); }
  .power-btn.on .ring2 { border-color:var(--on-glow); border-style:dashed; animation:spin 4s linear infinite; }
  .power-btn.off .ring1{ border-color:var(--off); box-shadow:0 0 16px var(--off-glow), inset 0 0 14px var(--off-dim); }
  @keyframes spin { to{transform:rotate(360deg)} }

  .power-icon { width:58px; height:58px; }
  .ico-l { stroke:var(--neutral); transition:stroke 0.4s, filter 0.4s; }
  .power-btn.on  .ico-l { stroke:var(--on);  filter:drop-shadow(0 0 6px var(--on)); }
  .power-btn.off .ico-l { stroke:var(--off); filter:drop-shadow(0 0 6px var(--off)); }

  /* Status */
  .status-group { display:flex; flex-direction:column; align-items:center; gap:5px; width:100%; }
  .status-text  { font-family:var(--sans); font-weight:700; font-size:28px; letter-spacing:4px; text-transform:uppercase; color:var(--neutral); transition:all 0.4s; }
  .status-text.on  { color:var(--on);  text-shadow:0 0 20px var(--on); }
  .status-text.off { color:var(--off); text-shadow:0 0 16px var(--off); }
  .status-sub { font-family:var(--mono); font-size:10px; color:var(--text-dim); letter-spacing:2px; text-align:center; }

  .uptime-badge {
    display:flex; align-items:center; gap:8px;
    font-family:var(--mono); font-size:12px; letter-spacing:1px;
    color:var(--text-dim); background:var(--bg);
    border:1px solid var(--border); padding:6px 16px; border-radius:20px;
    transition:all 0.4s;
  }
  .uptime-badge.running { color:var(--on); border-color:var(--on-glow); }

  /* Stats */
  .stats-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .stat-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:12px 10px;
    display:flex; flex-direction:column; gap:4px; align-items:center;
  }
  .stat-value { font-family:var(--mono); font-size:18px; font-weight:bold; color:#fff; }
  .stat-label { font-family:var(--mono); font-size:9px; color:var(--text-dim); letter-spacing:1.5px; text-transform:uppercase; text-align:center; }

  /* Log */
  .log-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
  .log-header { padding:10px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .log-title { font-family:var(--mono); font-size:10px; color:var(--text-dim); letter-spacing:2px; text-transform:uppercase; }
  .log-clear { font-family:var(--mono); font-size:9px; color:var(--text-dim); background:none; border:none; cursor:pointer; padding:2px 6px; border-radius:3px; transition:color 0.2s; }
  .log-clear:active { color:var(--off); }
  .log-list { max-height:150px; overflow-y:auto; padding:4px 0; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
  .log-item { display:flex; align-items:center; gap:10px; padding:6px 14px; border-bottom:1px solid rgba(30,45,61,0.4); animation:log-in 0.25s ease; }
  .log-item:last-child { border-bottom:none; }
  @keyframes log-in { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:none} }
  .log-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
  .log-dot.on   { background:var(--on);  box-shadow:0 0 4px var(--on); }
  .log-dot.off  { background:var(--off); box-shadow:0 0 4px var(--off); }
  .log-dot.info { background:var(--text-dim); }
  .log-msg  { font-family:var(--mono); font-size:11px; color:var(--text); flex:1; }
  .log-time { font-family:var(--mono); font-size:10px; color:var(--text-dim); white-space:nowrap; }

  /* Toast */
  .toast {
    position:fixed; bottom:24px; left:50%;
    transform:translateX(-50%) translateY(80px);
    background:#1a1f28; border:1px solid var(--border);
    border-radius:8px; padding:10px 20px;
    font-family:var(--mono); font-size:12px; letter-spacing:1px;
    color:var(--text); z-index:100;
    transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space:nowrap;
  }
  .toast.show    { transform:translateX(-50%) translateY(0); }
  .toast.success { border-color:var(--on-glow); color:var(--on); }
  .toast.error   { border-color:var(--off-glow); color:var(--off); }

  .footer { text-align:center; font-family:var(--mono); font-size:9px; color:var(--text-dim); letter-spacing:2px; opacity:0.4; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <div class="header-title">ESP32-C3 // HOME NET</div>
      <div class="header-name">Relay Control</div>
    </div>
    <div class="conn-badge">
      <div class="conn-dot" id="connDot"></div>
      <span id="connText">OFFLINE</span>
    </div>
  </div>

  <div class="relay-card" id="relayCard">
    <div class="relay-label">// Relay Ch.01 // GPIO4</div>

    <button class="power-btn" id="powerBtn" onclick="toggleRelay()">
      <div class="ring1"></div>
      <div class="ring2"></div>
      <svg class="power-icon" viewBox="0 0 58 58" fill="none">
        <line class="ico-l" x1="29" y1="11" x2="29" y2="29" stroke-width="3" stroke-linecap="round"/>
        <path class="ico-l" d="M19 17.5 A16 16 0 1 0 39 17.5" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </button>

    <div class="status-group">
      <div class="status-text" id="statusText">UNKNOWN</div>
      <div class="status-sub"  id="statusSub">Получение статуса...</div>
    </div>

    <div class="uptime-badge" id="uptimeBadge">
      <span>⏱</span><span id="uptimeVal">00:00:00</span>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-value" id="statOn">0</div><div class="stat-label">Включений</div></div>
    <div class="stat-card"><div class="stat-value" id="statOff">0</div><div class="stat-label">Выключений</div></div>
    <div class="stat-card"><div class="stat-value" id="statTotal">0m</div><div class="stat-label">Время ON</div></div>
  </div>

  <div class="log-card">
    <div class="log-header">
      <div class="log-title">// Activity Log</div>
      <button class="log-clear" onclick="clearLog()">CLEAR</button>
    </div>
    <div class="log-list" id="logList">
      <div class="log-item">
        <div class="log-dot info"></div>
        <div class="log-msg">Приложение запущено</div>
        <div class="log-time" id="startTime"></div>
      </div>
    </div>
  </div>

  <div class="footer">ESP32-C3 // RAILWAY PROXY // CLAUDE BUILD</div>
</div>
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════
//  ЗАМЕНИ НА СВОИ ЗНАЧЕНИЯ ПОСЛЕ ДЕПЛОЯ НА RAILWAY
// ════════════════════════════════════════════════════
const SERVER_URL  = 'esp32c3switch-production.up.railway.app'; // URL из Railway
const BOT_SECRET  = 'my-token-es-mel-32-clone';               // тот же что в server.js
// ════════════════════════════════════════════════════

// Telegram WebApp
if (window.Telegram?.WebApp) { Telegram.WebApp.ready(); Telegram.WebApp.expand(); }

// ── Audio ─────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx;
function ea() { if (!actx) actx = new AudioCtx(); }
function tone(f, t, d, v=0.13) {
  try {
    ea();
    const o=actx.createOscillator(), g=actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.type=t; o.frequency.setValueAtTime(f,actx.currentTime);
    o.frequency.exponentialRampToValueAtTime(f*0.5,actx.currentTime+d);
    g.gain.setValueAtTime(v,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);
    o.start(); o.stop(actx.currentTime+d);
  } catch(e){}
}
const soundOn    = () => { tone(440,'square',0.08,0.12); setTimeout(()=>tone(660,'square',0.1,0.1),80); setTimeout(()=>tone(880,'sine',0.18,0.1),160); };
const soundOff   = () => { tone(440,'sawtooth',0.06,0.1); setTimeout(()=>tone(330,'sawtooth',0.1,0.08),70); setTimeout(()=>tone(220,'square',0.15,0.15),140); };
const soundClick = () => tone(800,'square',0.05,0.06);
const soundError = () => tone(200,'sawtooth',0.3,0.18);

// ── State ─────────────────────────────────────────
let relayState=null, isConnected=false;
let uptimeStart=null, uptimeInterval=null;
let statsOn=0, statsOff=0, totalOnMs=0;
let pollInterval=null;

const ts  = d => d.toTimeString().slice(0,8);
const fmt = ms => { const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60; return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`; };

document.getElementById('startTime').textContent = ts(new Date());

// ── Log ───────────────────────────────────────────
function addLog(msg, type='info') {
  const list = document.getElementById('logList');
  const el = document.createElement('div');
  el.className = 'log-item';
  el.innerHTML = `<div class="log-dot ${type}"></div><div class="log-msg">${msg}</div><div class="log-time">${ts(new Date())}</div>`;
  list.insertBefore(el, list.firstChild);
  if (list.children.length > 30) list.removeChild(list.lastChild);
}
function clearLog() { soundClick(); document.getElementById('logList').innerHTML=''; addLog('Лог очищен'); }

// ── Toast ─────────────────────────────────────────
let toastT;
function showToast(msg, type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast show ${type}`;
  clearTimeout(toastT); toastT=setTimeout(()=>t.className='toast',2500);
}

// ── UI ────────────────────────────────────────────
function updateUI(state) {
  const btn=document.getElementById('powerBtn');
  const st=document.getElementById('statusText');
  const sb=document.getElementById('statusSub');
  const card=document.getElementById('relayCard');
  const up=document.getElementById('uptimeBadge');

  btn.className='power-btn'; st.className='status-text'; card.className='relay-card';

  if (state===true) {
    btn.classList.add('on'); st.classList.add('on'); card.classList.add('active'); up.classList.add('running');
    st.textContent='ACTIVE'; sb.textContent='Реле замкнуто — цепь активна';
    if (!uptimeStart) uptimeStart=Date.now();
    if (!uptimeInterval) uptimeInterval=setInterval(()=>{
      document.getElementById('uptimeVal').textContent=fmt(Date.now()-uptimeStart);
      totalOnMs+=1000;
      const m=Math.floor(totalOnMs/60000);
      document.getElementById('statTotal').textContent=m<60?`${m}m`:`${Math.floor(m/60)}h`;
    },1000);
  } else if (state===false) {
    btn.classList.add('off'); st.classList.add('off'); card.classList.add('inactive'); up.classList.remove('running');
    st.textContent='INACTIVE'; sb.textContent='Реле разомкнуто — цепь отключена';
    if (uptimeInterval){clearInterval(uptimeInterval);uptimeInterval=null;}
    uptimeStart=null; document.getElementById('uptimeVal').textContent='00:00:00';
  } else {
    st.textContent='UNKNOWN'; sb.textContent='Нет связи с устройством';
  }
}

function setConn(online) {
  isConnected=online;
  document.getElementById('connDot').className=`conn-dot ${online?'online':'error'}`;
  document.getElementById('connText').textContent=online?'ONLINE':'OFFLINE';
}

// ── API (через Railway proxy) ─────────────────────
const headers = () => ({ 'X-Bot-Secret': BOT_SECRET });

async function fetchStatus() {
  try {
    const res  = await fetch(`${SERVER_URL}/api/status`, { headers: headers(), signal: AbortSignal.timeout(4000) });
    const data = await res.json();
    const state = data.relay===1;
    if (state!==relayState) { relayState=state; updateUI(state); }
    if (!isConnected) { setConn(true); addLog('Соединение восстановлено','info'); }
  } catch(e) {
    if (isConnected) { setConn(false); updateUI(null); addLog('Соединение потеряно','off'); }
  }
}

async function toggleRelay() {
  ea();
  const btn=document.getElementById('powerBtn');
  btn.classList.add('loading');
  try {
    const res  = await fetch(`${SERVER_URL}/api/toggle`, { headers: headers(), signal: AbortSignal.timeout(5000) });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const newState = data.relay===1;
    relayState=newState; updateUI(newState);
    if (newState) {
      statsOn++; document.getElementById('statOn').textContent=statsOn;
      soundOn(); addLog('Реле включено','on'); showToast('⚡ Реле включено','success');
    } else {
      statsOff++; document.getElementById('statOff').textContent=statsOff;
      soundOff(); addLog('Реле выключено','off'); showToast('○ Реле выключено','');
    }
  } catch(e) {
    soundError(); addLog(`Ошибка: ${e.message}`,'off'); showToast('✗ Команда не доставлена','error');
  } finally {
    btn.classList.remove('loading');
  }
}

// ── Init ──────────────────────────────────────────
addLog('Подключение к серверу...','info');
fetchStatus().then(()=>{
  if (isConnected) addLog(`Статус получен: ${relayState?'ON':'OFF'}`, relayState?'on':'off');
  pollInterval = setInterval(fetchStatus, 4000);
});
</script>
</body>
</html>
